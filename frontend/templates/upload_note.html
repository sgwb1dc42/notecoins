{% extends "base.html" %}
{% block title %}Subir apunte — NoteCoin{% endblock %}
{% block content %}
<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="soft-panel p-4">
                <h1 class="h4 fw-bold mb-1">Subir apunte</h1>
                <p class="text-muted small mb-4">El contenido se hashea con SHA-256 al subirse.</p>

                {% if error %}
                <div class="alert alert-danger py-2 small">{{ error }}</div>
                {% endif %}

                <form method="post">
                    <div class="mb-3">
                        <label class="form-label fw-semibold small">Título <span class="text-danger">*</span></label>
                        <input type="text" name="title" class="form-control" required maxlength="120">
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-sm-8">
                            <label class="form-label fw-semibold small">Asignatura <span class="text-danger">*</span></label>
                            <select name="subject" class="form-select" required>
                                <option value="">Selecciona…</option>
                                {% for subj in subjects %}
                                {% set meta = subject_meta[subj] %}
                                <option value="{{ subj }}">{{ meta.icon }} {{ subj }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-sm-4">
                            <label class="form-label fw-semibold small">Precio (◈) <span class="text-danger">*</span></label>
                            <input type="number" name="price" class="form-control" min="0.1" max="10" step="0.1" value="1.0" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold small">Descripción breve</label>
                        <input type="text" name="description" class="form-control" maxlength="200">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold small">Contenido <span class="text-danger">*</span></label>
                        <textarea name="content" class="form-control mono-box" rows="12" required
                                  placeholder="Pega aquí el contenido del apunte…"></textarea>
                    </div>

                    <div class="d-flex gap-3">
                        <button type="submit" class="btn btn-warning fw-bold px-4">Publicar apunte</button>
                        <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
